name: RemindersWidget
options:
  bundleIdPrefix: com.brianpattison
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
settings:
  base:
    DEVELOPMENT_TEAM: 9Y4E2277K9
targets:
  RemindersWidget:
    type: application
    platform: iOS
    sources:
      - path: RemindersWidget
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brianpattison.RemindersWidget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Lock Screen
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIRequiresFullScreen: true
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: "This app needs access to your reminders to display them in the Lock Screen widget."
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
    dependencies:
      - target: RemindersWidgetExtension
  RemindersWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: RemindersWidgetExtension
        excludes:
          - Info.plist
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brianpattison.RemindersWidget.WidgetExtension
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Lock Screen
        INFOPLIST_FILE: RemindersWidgetExtension/Info.plist
  RemindersWidgetTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brianpattison.RemindersWidget.Tests
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: RemindersWidget
schemes:
  RemindersWidget:
    build:
      targets:
        RemindersWidget: all
        RemindersWidgetExtension: all
        RemindersWidgetTests: [test]
    test:
      targets:
        - RemindersWidgetTests
  RemindersWidgetTests:
    build:
      targets:
        RemindersWidgetTests: all
        RemindersWidget: all
    test:
      targets:
        - RemindersWidgetTests
