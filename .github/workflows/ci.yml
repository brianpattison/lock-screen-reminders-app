name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: macos-latest
    timeout-minutes: 30

    env:
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      XCODE_SCHEME: RemindersWidgetTests

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install swift-format
        run: brew install swift-format

      - name: Validate Swift formatting
        run: swift-format lint --configuration .swift-format --recursive --parallel --strict RemindersWidget RemindersWidgetExtension Shared Tests

      - name: Select test simulator
        run: |
          set -euo pipefail

          xcrun simctl list devices available --json | ruby -rjson -e '
            devices_by_runtime = JSON.parse(ARGF.read).fetch("devices")
            ios_devices = devices_by_runtime
              .select { |runtime, _| runtime.include?(".iOS-") }
              .values
              .flatten
              .select { |device| device["isAvailable"] }

            device = ios_devices.find { |device| device.fetch("name").start_with?("iPhone") } ||
              ios_devices.first

            abort("No available iOS simulator devices found.") unless device

            File.open(ENV.fetch("GITHUB_ENV"), "a") do |env|
              env.puts "SIMULATOR_DESTINATION=platform=iOS Simulator,id=#{device.fetch("udid")}"
            end

            puts "Using iOS simulator: #{device.fetch("name")} (#{device.fetch("udid")})"
          '

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme "$XCODE_SCHEME" \
            -destination "$SIMULATOR_DESTINATION" \
            -derivedDataPath build/DerivedData \
            -quiet
